name: Telegram Auto Post

on:
  workflow_dispatch:

jobs:
  send-message:
    runs-on: ubuntu-latest

    steps:
      - name: Send Telegram Message
        run: curl -s -X POST "https://api.telegram.org/bot${{ secrets.BOT_TOKEN }}/sendMessage" -d chat_id="${{ secrets.CHAT_ID }}" --data-urlencode text="Test message from BTC_Chopsticks Auto Bot 🚀"
